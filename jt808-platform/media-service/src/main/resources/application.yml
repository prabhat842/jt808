spring:
  application:
    name: jt808-media-service
  main:
    web-application-type: reactive

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

jt808:
  media:
    kafka:
      enabled: false
      bootstrap-servers: 127.0.0.1:9092
      group-id: media-service
    redis:
      enabled: false
      correlation-ttl-seconds: 300
