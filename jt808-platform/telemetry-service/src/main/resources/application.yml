spring:
  application:
    name: jt808-telemetry-service
  main:
    web-application-type: reactive

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

jt808:
  telemetry:
    kafka:
      enabled: false
      bootstrap-servers: 127.0.0.1:9092
      group-id: telemetry-service
    click-house:
      url: http://127.0.0.1:8123/
      database: jt808
      table: vehicle_gps
      username: default
      password: ""
      batch-size: 1000
      flush-interval-ms: 1000
